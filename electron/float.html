<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Plan Button</title>
    <style>
      html,
      body {
        width: 56px;
        height: 56px;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Microsoft YaHei", sans-serif;
      }

      button {
        display: grid;
        width: 52px;
        height: 52px;
        margin: 2px;
        place-items: center;
        border: 0;
        border-radius: 18px 5px 5px 18px;
        color: #ffffff;
        background: linear-gradient(145deg, #1d4ed8 0%, #2563eb 58%, #0f9f6e 145%);
        box-shadow:
          0 12px 30px rgba(37, 99, 235, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
        cursor: pointer;
        font-size: 14px;
        font-weight: 800;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          filter 140ms ease;
      }

      button:hover {
        filter: brightness(1.03);
        transform: translateX(-2px);
        box-shadow:
          0 16px 34px rgba(37, 99, 235, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.32);
      }
    </style>
  </head>
  <body>
    <button type="button" title="打开 Local Plan">LP</button>
    <script>
      document.querySelector("button").addEventListener("click", () => {
        window.localPlanFloat.open();
      });
    </script>
  </body>
</html>
